services:
  api:
    image: zjxteusa/framepro-api:latest
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - PYTHONPATH=/app
    restart: unless-stopped

  web:
    image: zjxteusa/framepro-web:latest
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    environment:
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_API_URL_BROWSER=http://localhost:8000
    restart: unless-stopped
    depends_on:
      - api
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - framepro_redis_data:/data

volumes:
  framepro_redis_data:
